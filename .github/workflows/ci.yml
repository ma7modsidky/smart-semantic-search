name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'   # <--- ONLY run if something in the backend folder changed
  workflow_dispatch:    
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest httpx

      - name: Run Tests
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        # We use 'mock' so we don't need a real DB or API Key for CI
        run: |
          cd backend
          pytest