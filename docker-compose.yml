# version: '3.8'

services:
  # 1. The Database
  db:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: semantic_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
  # 2. The Backend (FastAPI)
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app  # This links your code!
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/semantic_db
      - AI_API_KEY=${AI_API_KEY}
    depends_on:
      - db
    # This command enables "reload" so the server restarts on save
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: nextjs_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app             # Bind mount for your code
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - WATCHPACK_POLLING=true      # Critical for Docker on Windows/Mac to detect changes
    command: npm run dev  
    networks:
      - app-network

# Ensure you have the network defined at the bottom if not already there
networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:         # This persists your postgres db data
  frontend_node_modules: # This persists your node_modules
  frontend_next_cache:   # This persists your Next.js build cache